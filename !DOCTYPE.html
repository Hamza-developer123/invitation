<!DOCTYPE html>
<html>
<head>
  <title>Invitation Video</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: linear-gradient(to right, #ffe4e1, #fff0f5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* MAIN CARD */
    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 182, 193, 0.7);
      text-align: center;
      max-width: 550px;
      width: 90%;
      position: relative;
      z-index: 1;
    }

    .title {
      color: #d63384;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #555;
      font-size: 16px;
      margin-bottom: 15px;
    }

    video {
      width: 100%;
      border-radius: 15px;
      border: 4px solid #ffb6c1;
    }

    .footer {
      margin-top: 15px;
      font-style: italic;
      color: #b03060;
    }

    /* LEFT NAME */
    .left-name {
      position: fixed;
      left: -10px;
      top: 50%;
      transform: translateY(-50%);
      width: 350px;   /* size yahan change kar sakte ho */
    }

    /* RIGHT NAME */
    .right-name {
      position: fixed;
      right: -10px;
      top: 45%;
      transform: translateY(-50%);
      width: 350px;   /* size yahan change kar sakte ho */
    }

  </style>
</head>
<body>

  <!-- LEFT NAME (Arooj) -->
  <img src="awais.png" class="left-name">

  <!-- RIGHT NAME (Awais) -->
  <img src="arooj.png" class="right-name">

  <!-- MAIN CARD -->
  <div class="card">
    <div class="title">Wedding Invitation 💖</div>
    <div class="subtitle">A beautiful moment awaits you</div>

    <video autoplay playsinline controls>
      <source src="yourvideo.mp4" type="video/mp4">
    </video>

    <div class="footer">
      We would be honored by your presence
    </div>
  </div>

</body>
</html>
