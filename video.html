<!DOCTYPE html>
<html lang="en">
<head>
  <title>Wedding Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffe4e1, #fff0f5);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 8px;
      overflow-x: hidden;
    }

    .top-name {
      width: 168px;
      max-width: 42vw;
      margin-bottom: 8px;
      margin-top: -15px;
      z-index: 5;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: white;
      padding: 18px 16px;
      border-radius: 22px;
      box-shadow: 0 0 25px rgba(255, 182, 193, 0.8);
      margin-top: -28px;
      z-index: 2;
    }

    .islamic-text {
      color: #d63384;
      font-size: 21px;
      line-height: 1.4;
      margin-bottom: 8px;
      font-weight: 600;
      text-align: center;
      direction: rtl;
    }

    .urdu-translation {
      color: #b03060;
      font-size: 15.5px;
      line-height: 1.5;
      margin-bottom: 14px;
      font-style: italic;
      font-weight: 500;
      text-align: center;
    }

    .title {
      color: #d63384;
      font-size: 26px;
      margin-bottom: 8px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 16px;
      border: 5px solid #ffb6c1;
      display: block;
      margin-top: 10px;
    }

    .footer {
      margin-top: 14px;
      font-style: italic;
      color: #b03060;
      font-size: 14px;
      text-align: center;
    }

    .bottom-name {
      width: 168px;
      max-width: 42vw;
      margin-top: -18px;
      z-index: 5;
    }

    /* Mobile Fine Tuning */
    @media (max-width: 768px) {
      .top-name {
        width: 155px;
        margin-bottom: 6px;
        margin-top: -18px;
      }

      .card {
        padding: 16px 14px;
        border-radius: 20px;
        margin-top: -35px;
      }

      .islamic-text {
        font-size: 19px;
      }

      .urdu-translation {
        font-size: 14.5px;
      }

      .bottom-name {
        width: 155px;
        margin-top: -22px;
      }

      video {
        border-width: 4px;
      }
    }
  </style>
</head>
<body>

  <!-- Top Name -->
  <img src="awais.png" alt="Awais" class="top-name">

  <!-- Video Card -->
  <div class="card">
    <div class="islamic-text">
      النِّكَاحُ نِصْفُ الدِّينِ وَهُوَ سَبَبٌ لِلسَّكِينَةِ فِي الْحَيَاةِ
    </div>
    <div class="urdu-translation">
      نکاح آدھا دین ہے اور زندگی میں سکون کا ذریعہ ہے
    </div>

    <video autoplay playsinline controls>
      <source src="yourvideo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="footer">
      We would be honored by your presence
    </div>
  </div>

  <!-- Bottom Name -->
  <img src="arooj.png" alt="Arooj" class="bottom-name">

</body>
</html>
