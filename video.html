<!DOCTYPE html>
<html lang="en">
<head>
  <title>Wedding Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffe4e1, #fff0f5);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      overflow-x: hidden;
    }

    .top-name {
      width: 170px;
      max-width: 42vw;
      margin-bottom: 12px;   /* thoda kam kiya */
      z-index: 5;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: white;
      padding: 16px;
      border-radius: 22px;
      box-shadow: 0 0 25px rgba(255, 182, 193, 0.8);
      margin-top: -15px;     /* video ko thoda oper shift */
      z-index: 2;
    }

    .title {
      color: #d63384;
      font-size: 26px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #555;
      font-size: 15px;
      margin-bottom: 14px;
    }

    video {
      width: 100%;
      border-radius: 16px;
      border: 5px solid #ffb6c1;
      display: block;
    }

    .footer {
      margin-top: 14px;
      font-style: italic;
      color: #b03060;
      font-size: 14px;
    }

    .bottom-name {
      width: 170px;
      max-width: 42vw;
      margin-top: -8px;      /* bottom image ko oper kiya */
      z-index: 5;
    }

    /* Mobile Fine Tuning */
    @media (max-width: 768px) {
      .top-name {
        width: 155px;
        margin-bottom: 10px;
      }

      .card {
        padding: 14px;
        border-radius: 20px;
        margin-top: -20px;     /* mobile pe video aur oper */
      }

      .bottom-name {
        width: 155px;
        margin-top: -12px;     /* bottom name ko aur thoda oper */
      }

      video {
        border-width: 4px;
      }
    }
  </style>
</head>
<body>

  <!-- Top Name -->
  <img src="awais.png" alt="Awais" class="top-name">

  <!-- Video Card -->
  <div class="card">
    <div class="title">Wedding Invitation 💖</div>
    <div class="subtitle">A beautiful moment awaits you</div>
    <video autoplay playsinline controls>
      <source src="yourvideo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="footer">
      We would be honored by your presence
    </div>
  </div>

  <!-- Bottom Name -->
  <img src="arooj.png" alt="Arooj" class="bottom-name">

</body>
</html>
