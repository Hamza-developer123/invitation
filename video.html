<!DOCTYPE html>
<html>
<head>
  <title>Invitation Video</title>

  <!-- MOBILE RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    /* ===== BASE ===== */
    body {
      margin: 0;
      padding: 20px 0;
      font-family: Arial;
      background: linear-gradient(to right, #ffe4e1, #fff0f5);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== TOP NAME ===== */
    .left-name {
      width: 280px;
      margin-bottom: 20px;
    }

    /* ===== CARD ===== */
    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 182, 193, 0.7);
      text-align: center;
      max-width: 550px;
      width: 90%;
    }

    .title {
      color: #d63384;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #555;
      font-size: 16px;
      margin-bottom: 15px;
    }

    video {
      width: 100%;
      max-height: 400px;
      border-radius: 15px;
      border: 4px solid #ffb6c1;
    }

    .footer {
      margin-top: 15px;
      font-style: italic;
      color: #b03060;
    }

    /* ===== BOTTOM NAME ===== */
    .right-name {
      width: 280px;
      margin-top: 20px;
    }

    /* ===== DESKTOP ADJUST ===== */
    @media (min-width: 769px) {

      body {
        justify-content: center;
      }

      .left-name {
        position: fixed;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
      }

      .right-name {
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        margin-top: 0;
      }
    }

    /* ===== MOBILE ADJUST ===== */
    @media (max-width: 768px) {

      .left-name {
        width: 160px;
      }

      .right-name {
        width: 160px;
      }

      .card {
        width: 92%;
      }

      video {
        max-height: 300px;
      }
    }

  </style>
</head>

<body>

  <!-- TOP NAME -->
  <img src="awais.png" class="left-name">

  <!-- MAIN CARD -->
  <div class="card">
    <div class="title">Wedding Invitation 💖</div>
    <div class="subtitle">A beautiful moment awaits you</div>

    <video autoplay playsinline controls>
      <source src="yourvideo.mp4" type="video/mp4">
    </video>

    <div class="footer">
      We would be honored by your presence
    </div>
  </div>

  <!-- BOTTOM NAME -->
  <img src="arooj.png" class="right-name">

</body>
</html>
