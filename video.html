<!DOCTYPE html>
<html lang="en">
<head>
  <title>Invitation Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffe4e1, #fff0f5);
      min-height: 100vh;
      min-height: -webkit-fill-available; /* iOS safe height fix */
      position: relative;
      overflow-x: hidden;
      text-align: center;
      padding-bottom: 120px; /* bottom name ke liye extra space */
    }

    /* ===== VIDEO CARD ===== */
    .card {
      position: relative;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 182, 193, 0.7);
      width: 90%;
      max-width: 550px;
      z-index: 2;
    }

    .title {
      color: #d63384;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #555;
      font-size: 16px;
      margin-bottom: 15px;
    }

    video {
      width: 100%;
      border-radius: 15px;
      border: 4px solid #ffb6c1;
      display: block;
    }

    .footer {
      margin-top: 15px;
      font-style: italic;
      color: #b03060;
    }

    /* ===== NAMES ===== */
    .top-name {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      max-width: 40vw;
      z-index: 5;
    }

    .bottom-name {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      max-width: 40vw;
      z-index: 5;
    }

    /* ===== MOBILE FIXES ===== */
    @media (max-width: 768px) {
      .card {
        width: 94%;
        padding: 15px 12px;
        margin: 70px auto 100px; /* top name + bottom name ke liye space */
      }

      .top-name {
        top: 12px;
        width: 160px;
      }

      .bottom-name {
        bottom: max(25px, env(safe-area-inset-bottom));
        width: 160px;
      }

      body {
        padding-bottom: 140px; /* extra breathing room for very tall mobiles */
      }
    }

    /* Extra safety for notch / dynamic island phones */
    @media (max-width: 768px) and (orientation: portrait) {
      .bottom-name {
        bottom: max(30px, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>

  <!-- Top Name -->
  <img src="awais.png" alt="Awais" class="top-name">

  <!-- Video Card -->
  <div class="card">
    <div class="title">Wedding Invitation 💖</div>
    <div class="subtitle">A beautiful moment awaits you</div>
    <video autoplay playsinline controls>
      <source src="yourvideo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="footer">
      We would be honored by your presence
    </div>
  </div>

  <!-- Bottom Name -->
  <img src="arooj.png" alt="Arooj" class="bottom-name">

</body>
</html>
