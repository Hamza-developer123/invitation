<!DOCTYPE html>
<html lang="en">
<head>
  <title>Invitation Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffe4e1, #fff0f5);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      text-align: center;
      padding-bottom: 80px; /* bottom name ke liye space */
    }

    /* ===== VIDEO CARD ===== */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 182, 193, 0.7);
      width: 90%;
      max-width: 550px;
      z-index: 2;
    }

    .title {
      color: #d63384;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #555;
      font-size: 16px;
      margin-bottom: 15px;
    }

    video {
      width: 100%;
      border-radius: 15px;
      border: 4px solid #ffb6c1;
      display: block;
    }

    .footer {
      margin-top: 15px;
      font-style: italic;
      color: #b03060;
    }

    /* ===== NAMES ===== */
    .left-name {
      position: fixed;
      left: 20px;
      top: 45%;
      transform: translateY(-50%);
      width: 250px;
      z-index: 5;
      max-width: 25vw;
    }

    .right-name {
      position: fixed;
      right: 20px;
      top: 55%;
      transform: translateY(-50%);
      width: 250px;
      z-index: 5;
      max-width: 25vw;
    }

    /* ===== MOBILE FIXES ===== */
    @media (max-width: 768px) {
      .card {
        width: 92%;
        padding: 15px;
        top: 50%; /* center mein rakha */
      }

      /* Top Name */
      .left-name {
        position: absolute; /* fixed ki jagah absolute better mobile pe */
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        max-width: 40vw;
      }

      /* Bottom Name */
      .right-name {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        max-width: 40vw;
      }

      body {
        padding-bottom: 100px; /* extra space bottom name ke liye */
      }
    }

    /* Extra safe area for very tall mobiles (notch wale phones) */
    @media (max-width: 768px) and (orientation: portrait) {
      .right-name {
        bottom: max(15px, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <!-- Top Name -->
  <img src="awais.png" alt="Awais" class="left-name">

  <!-- Video Card -->
  <div class="card">
    <div class="title">Wedding Invitation 💖</div>
    <div class="subtitle">A beautiful moment awaits you</div>
    <video autoplay playsinline controls>
      <source src="yourvideo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="footer">
      We would be honored by your presence
    </div>
  </div>

  <!-- Bottom Name -->
  <img src="arooj.png" alt="Arooj" class="right-name">
</body>
</html>
