<!DOCTYPE html>
<html>
<head>
  <title>Invitation Video</title>

  <!-- IMPORTANT FOR MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: linear-gradient(to right, #ffe4e1, #fff0f5);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 182, 193, 0.7);
      text-align: center;
      max-width: 550px;
      width: 90%;
      z-index: 2;
    }

    .title {
      color: #d63384;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #555;
      font-size: 16px;
      margin-bottom: 15px;
    }

    video {
      width: 100%;
      max-height: 400px;
      border-radius: 15px;
      border: 4px solid #ffb6c1;
    }

    .footer {
      margin-top: 15px;
      font-style: italic;
      color: #b03060;
    }

    /* ===== DESKTOP NAME POSITION ===== */
    .left-name {
      position: fixed;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
    }

    .right-name {
      position: fixed;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
    }

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 768px) {

      body {
        flex-direction: column;
      }

      /* names top & bottom */
      .left-name {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 180px;
      }

      .right-name {
        position: absolute;
        bottom: 120px;
        right: 50%;
        transform: translateX(50%);
        width: 180px;
      }

      /* video bigger on mobile */
      video {
        max-height: 250px;
      }
    }
  </style>
</head>

<body>

  <!-- LEFT NAME -->
  <img src="awais.png" class="left-name">

  <!-- RIGHT NAME -->
  <img src="arooj.png" class="right-name">

  <!-- MAIN CARD -->
  <div class="card">
    <div class="title">Wedding Invitation 💖</div>
    <div class="subtitle">A beautiful moment awaits you</div>

    <video autoplay playsinline controls>
      <source src="yourvideo.mp4" type="video/mp4">
    </video>

    <div class="footer">
      We would be honored by your presence
    </div>
  </div>

</body>
</html>
