<!DOCTYPE html>
<html>
<head>
  <title>Invitation Video</title>

  <!-- MOBILE RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    /* ===== BASE PAGE ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: linear-gradient(to right, #ffe4e1, #fff0f5);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== CENTER CARD ===== */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 182, 193, 0.7);
      text-align: center;
      max-width: 550px;
      width: 90%;
      z-index: 5;
    }

    .title {
      color: #d63384;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #555;
      font-size: 16px;
      margin-bottom: 15px;
    }

    video {
      width: 100%;
      max-height: 400px;
      border-radius: 15px;
      border: 4px solid #ffb6c1;
    }

    .footer {
      margin-top: 15px;
      font-style: italic;
      color: #b03060;
    }

    /* ===== DESKTOP NAMES ===== */
    .left-name {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 280px;
      z-index: 10;
    }

    .right-name {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 280px;
      z-index: 10;
    }

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 768px) {

      /* TOP NAME */
      .left-name {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        z-index: 10;
      }

      /* BOTTOM NAME (FIXED) */
      .right-name {
        position: absolute;
        bottom: 10px;   /* 👈 FIXED */
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        z-index: 10;
      }

      /* CARD CENTER ADJUST */
      .card {
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 92%;
        z-index: 5;
      }

      /* VIDEO SIZE MOBILE */
      video {
        max-height: 300px;
      }
    }

  </style>
</head>

<body>

  <!-- LEFT / TOP NAME -->
  <img src="awais.png" class="left-name">

  <!-- RIGHT / BOTTOM NAME -->
  <img src="arooj.png" class="right-name">

  <!-- MAIN CARD -->
  <div class="card">
    <div class="title">Wedding Invitation 💖</div>
    <div class="subtitle">A beautiful moment awaits you</div>

    <video autoplay playsinline controls>
      <source src="yourvideo.mp4" type="video/mp4">
    </video>

    <div class="footer">
      We would be honored by your presence
    </div>
  </div>

</body>
</html>
